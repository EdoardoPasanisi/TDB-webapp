<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Tenuta del Barone</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #060807;
        color: #f4f4f2;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        text-align: center;
      }
      h1 { font-size: 20px; font-weight: 600; margin: 0; }
      p { margin: 0; opacity: 0.7; font-size: 15px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Tenuta del Barone</h1>
      <p>Connessione assente.<br />Controlla la rete e riprova.</p>
    </div>
  </body>
</html>
